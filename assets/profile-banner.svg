<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160">
  <defs>
    <style>
      .umb-body { transform-origin: 7.5px 15px; animation: umb-sway 3s infinite ease-in-out; }
      .umb-shadow { animation: umb-s 3s infinite; }
      .umb-eyes { transform-origin: 7.5px 9px; animation: umb-blink 4s infinite; }
      .rain1 { animation: rain-fall 0.6s infinite linear; }
      .rain2 { animation: rain-fall 0.6s infinite linear 0.15s; }
      .rain3 { animation: rain-fall 0.6s infinite linear 0.3s; }
      .rain4 { animation: rain-fall 0.6s infinite linear 0.45s; }
      .rain5 { animation: rain-fall 0.8s infinite linear 0.2s; }
      .rain6 { animation: rain-fall 0.7s infinite linear 0.35s; }
      .rain7 { animation: rain-fall 0.9s infinite linear 0.5s; }
      .rain8 { animation: rain-fall 0.65s infinite linear 0.1s; }
      .bubble { animation: bubble-pulse 2s infinite ease-in-out; }
      @keyframes umb-sway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-2deg); } }
      @keyframes umb-s { 0%, 100% { opacity: 0.5; } }
      @keyframes umb-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
      @keyframes rain-fall { 0% { transform: translateY(-15px); opacity: 0.6; } 100% { transform: translateY(20px); opacity: 0; } }
      @keyframes bubble-pulse { 0%, 100% { opacity: 0.75; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect x="0" y="0" width="560" height="160" rx="8" fill="#222129"/>

  <!-- clouds -->
  <ellipse cx="60" cy="26" rx="50" ry="14" fill="#3a3945" opacity="0.5"/>
  <ellipse cx="500" cy="28" rx="48" ry="13" fill="#3a3945" opacity="0.5"/>

  <!-- ambient rain (CSS, from clawd-pet) -->
  <rect class="rain1" x="40" y="20" width="1.5" height="4" fill="#6a9ec7" opacity="0.5"/>
  <rect class="rain2" x="90" y="18" width="1.5" height="4" fill="#6a9ec7" opacity="0.5"/>
  <rect class="rain3" x="140" y="22" width="1.5" height="4" fill="#6a9ec7" opacity="0.5"/>
  <rect class="rain4" x="190" y="19" width="1.5" height="4" fill="#6a9ec7" opacity="0.5"/>
  <rect class="rain5" x="380" y="21" width="1.5" height="4" fill="#6a9ec7" opacity="0.5"/>
  <rect class="rain6" x="430" y="17" width="1.5" height="4" fill="#6a9ec7" opacity="0.5"/>
  <rect class="rain7" x="480" y="23" width="1.5" height="4" fill="#6a9ec7" opacity="0.5"/>
  <rect class="rain8" x="520" y="20" width="1.5" height="4" fill="#6a9ec7" opacity="0.5"/>

  <!-- puddle -->
  <ellipse cx="280" cy="148" rx="170" ry="7" fill="#6a9ec7" opacity="0.12"/>

  <!-- clawd-umbrella cat by abderrahimghazali/clawd-pet (MIT) -->
  <g transform="translate(242, 68) scale(5)">
    <rect class="umb-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
    <rect class="rain1" x="-5" y="-5" width="1" height="2" fill="#6a9ec7" opacity="0.5"/>
    <rect class="rain2" x="0" y="-3" width="1" height="2" fill="#6a9ec7" opacity="0.5"/>
    <rect class="rain3" x="17" y="-4" width="1" height="2" fill="#6a9ec7" opacity="0.5"/>
    <rect class="rain4" x="22" y="-6" width="1" height="2" fill="#6a9ec7" opacity="0.5"/>
    <g class="umb-body">
      <g fill="#DE886D">
        <rect x="3" y="13" width="1" height="2"/>
        <rect x="5" y="13" width="1" height="2"/>
        <rect x="9" y="13" width="1" height="2"/>
        <rect x="11" y="13" width="1" height="2"/>
        <rect x="2" y="6" width="11" height="7"/>
        <rect x="0" y="9" width="2" height="2"/>
        <rect x="13" y="7" width="2" height="2"/>
      </g>
      <rect x="14" y="7" width="1" height="8" fill="#555"/>
      <rect x="8" y="0" width="12" height="1" fill="#FF4444"/>
      <rect x="9" y="-1" width="10" height="2" fill="#FF4444"/>
      <rect x="10" y="-2" width="8" height="2" fill="#FF4444"/>
      <g class="umb-eyes" fill="#000">
        <rect x="4" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>
    </g>
  </g>

  <!-- speech bubble -->
  <g class="bubble">
    <rect x="350" y="36" width="86" height="34" rx="11" fill="#222129" stroke="#DE886D" stroke-width="1.5"/>
    <polygon points="352,64 360,64 346,76" fill="#222129" stroke="#DE886D" stroke-width="1"/>
    <text x="393" y="59" text-anchor="middle" fill="#DE886D" font-family="monospace" font-size="14" font-weight="bold">meow~!</text>
  </g>
</svg>
