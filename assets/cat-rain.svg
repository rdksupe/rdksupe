<!-- puddle -->
<ellipse cx="280" cy="148" rx="170" ry="7" fill="#6a9ec7" opacity="0.1"/>

<!-- cat body -->
<ellipse cx="280" cy="108" rx="40" ry="28" fill="#FFA86A"/>
<!-- head -->
<circle cx="280" cy="72" r="26" fill="#FFA86A"/>
<!-- left ear -->
<polygon points="262,52 257,30 273,50" fill="#FFA86A"/>
<polygon points="264,50 260,35 271,49" fill="#bc8d6b"/>
<!-- right ear -->
<polygon points="298,52 303,30 287,50" fill="#FFA86A"/>
<polygon points="296,50 300,35 289,49" fill="#bc8d6b"/>
<!-- eyes -->
<ellipse cx="271" cy="70" rx="4.5" ry="5.5" fill="#222129"/>
<ellipse cx="289" cy="70" rx="4.5" ry="5.5" fill="#222129"/>
<!-- eye shine -->
<circle cx="273" cy="68" r="1.6" fill="#fff"/>
<circle cx="291" cy="68" r="1.6" fill="#fff"/>
<!-- nose -->
<ellipse cx="280" cy="77" rx="2.8" ry="2" fill="#bc8d6b"/>
<!-- mouth open (meowing) -->
<ellipse cx="280" cy="84" rx="4.5" ry="3.5" fill="#222129"/>
<ellipse cx="280" cy="85" rx="3" ry="1.8" fill="#bc8d6b"/>
<!-- whiskers -->
<line x1="260" y1="75" x2="244" y2="71" stroke="#bc8d6b" stroke-width="1"/>
<line x1="260" y1="79" x2="244" y2="83" stroke="#bc8d6b" stroke-width="1"/>
<line x1="300" y1="75" x2="316" y2="71" stroke="#bc8d6b" stroke-width="1"/>
<line x1="300" y1="79" x2="316" y2="83" stroke="#bc8d6b" stroke-width="1"/>
<!-- tail -->
<path d="M320 108 Q345 88 342 58" fill="none" stroke="#FFA86A" stroke-width="5" stroke-linecap="round">
  <animate attributeName="d" values="M320 108 Q345 88 342 58;M320 108 Q350 92 348 62;M320 108 Q345 88 342 58" dur="2s" repeatCount="indefinite"/>
</path>
<!-- front paws -->
<ellipse cx="264" cy="130" rx="9" ry="5.5" fill="#FFA86A"/>
<ellipse cx="296" cy="130" rx="9" ry="5.5" fill="#FFA86A"/>
<!-- back paws -->
<ellipse cx="252" cy="132" rx="8" ry="5" fill="#FFA86A"/>
<ellipse cx="308" cy="132" rx="8" ry="5" fill="#FFA86A"/>

<!-- speech bubble -->
<g>
  <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  <rect x="330" y="36" width="86" height="34" rx="11" fill="#222129" stroke="#FFA86A" stroke-width="1.5"/>
  <polygon points="332,64 340,64 328,76" fill="#222129" stroke="#FFA86A" stroke-width="1"/>
  <text x="373" y="59" text-anchor="middle" fill="#FFA86A" font-family="monospace" font-size="14" font-weight="bold">meow~!</text>
</g>
</svg>
