name: Update profile README

on:
  schedule:
    # Every 6 hours (UTC): 00:00, 06:00, 12:00, 18:00
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate banner from Bokaro weather
        run: python3 scripts/update_banner.py

      - name: Pick a random xkcd comic
        run: python3 scripts/update_xkcd.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-banner.svg README.md
          if git diff --staged --quiet; then
            echo "Nothing changed; skipping commit."
            exit 0
          fi
          git commit -m "chore: refresh profile banner and random xkcd" -m "Auto-generated banner from Open-Meteo (Bokaro) and comic from xkcd.com."
          git push
